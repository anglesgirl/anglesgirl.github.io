name: Deploy to GitHub Pages
on:
  push:
    branches: [main] # 代码推送到main分支时触发部署
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4 # 拉取仓库代码
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20 # 匹配你本地的Node.js版本（或兼容版本）
          cache: 'npm' # 缓存npm依赖，加速构建
      - name: Install dependencies
        run: npm install # 安装项目依赖
      - name: Build Astro site
        run: npm run build # 构建Astro静态站点（生成dist文件夹）
      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }} # GitHub自动提供的令牌，无需手动配置
          publish_dir: ./dist # 部署dist文件夹中的静态资源